name: management-system

x-app-environment: &app-environment
  DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-management_system}
  AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
  FEISHU_APP_ID: ${FEISHU_APP_ID:?FEISHU_APP_ID is required}
  FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:?FEISHU_APP_SECRET is required}
  FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
  FEISHU_PROCUREMENT_WEBHOOK_URL: ${FEISHU_PROCUREMENT_WEBHOOK_URL:-}
  FEISHU_WEBHOOK_SECRET: ${FEISHU_WEBHOOK_SECRET:-}
  FEISHU_PROCUREMENT_WEBHOOK_SECRET: ${FEISHU_PROCUREMENT_WEBHOOK_SECRET:-}
  FEISHU_CONTACT_SYNC_CRON: ${FEISHU_CONTACT_SYNC_CRON:-30 8 * * *}
  NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?NEXT_PUBLIC_APP_URL is required}
  APP_ALLOWED_ORIGINS: ${APP_ALLOWED_ORIGINS:?APP_ALLOWED_ORIGINS is required}
  LAN_HOST: ${LAN_HOST:-}
  ALLOWED_DEV_ORIGINS: ${ALLOWED_DEV_ORIGINS:-}
  UPLOAD_STORAGE_DIR: ${UPLOAD_STORAGE_DIR:-/app/storage/uploads}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-management_system}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ../management_system_data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-management_system}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  app:
    build: .
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      <<: *app-environment
      # 容器内监听全部网卡，供端口映射访问
      HOSTNAME: 0.0.0.0
      RUN_DB_SEED: ${RUN_DB_SEED:-false}
    volumes:
      - app-uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  cron:
    build: .
    entrypoint: ["/entrypoint.sh"]
    command: ["npx", "tsx", "scripts/cron.ts"]
    environment:
      <<: *app-environment
      SKIP_DB_DEPLOY: "true"
      RUN_DB_SEED: "false"
    volumes:
      - app-uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  app-uploads:
